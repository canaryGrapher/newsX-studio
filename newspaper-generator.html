<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newspaper Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=UnifrakturMaguntia&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #2a2a2a;
    min-height: 100vh;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
  }

  /* ── Controls bar ── */
  .controls {
    width: 100%;
    background: #1a1a1a;
    border-bottom: 2px solid #444;
    padding: 12px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .controls label {
    color: #ccc;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .controls select, .controls input[type=range] {
    background: #333;
    border: 1px solid #555;
    color: #eee;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
  }

  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }

  .btn-primary {
    background: #c8a84b;
    color: #1a1a1a;
  }
  .btn-primary:hover { background: #d4b45a; transform: translateY(-1px); }

  .btn-secondary {
    background: #444;
    color: #eee;
    border: 1px solid #666;
  }
  .btn-secondary:hover { background: #555; }

  .sep {
    width: 1px;
    height: 28px;
    background: #444;
    margin: 0 4px;
  }

  .controls-title {
    color: #c8a84b;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-right: 8px;
  }

  /* ── Paper wrapper ── */
  .paper-wrapper {
    padding: 40px 20px 60px;
    width: 100%;
    max-width: 900px;
    display: flex;
    justify-content: center;
  }

  /* ── Newspaper ── */
  .newspaper {
    width: 100%;
    max-width: 820px;
    position: relative;
    padding: 40px 44px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  /* Grain overlay */
  .newspaper::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: var(--grain-opacity, 0.5);
    z-index: 10;
    mix-blend-mode: multiply;
  }

  /* ── Masthead ── */
  .masthead {
    text-align: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
  }

  .masthead-name {
    letter-spacing: 6px;
    text-transform: uppercase;
    font-size: 11px;
    margin-bottom: 6px;
  }

  .pub-date {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .rule-double {
    height: 6px;
    border-top: 2px solid;
    border-bottom: 1px solid;
    margin: 8px 0;
    opacity: 0.8;
  }

  .rule-single {
    height: 1px;
    border-top: 1px solid;
    margin: 10px 0;
    opacity: 0.5;
  }

  /* ── Headline block ── */
  .headline {
    text-align: left;
    margin-bottom: 10px;
    line-height: 1.05;
    font-weight: 900;
  }

  .deck {
    font-size: 18px;
    font-weight: 400;
    line-height: 1.3;
    margin-bottom: 10px;
  }

  /* ── Byline ── */
  .byline-block {
    margin-bottom: 12px;
  }

  .dateline {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .byline {
    font-size: 11px;
    letter-spacing: 0.5px;
    font-style: italic;
  }

  /* ── Article body ── */
  .article-body {
    display: grid;
    gap: 0 20px;
    align-items: start;
  }

  .article-body p {
    text-align: justify;
    hyphens: auto;
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .article-body p:first-of-type::first-letter {
    float: left;
    font-size: 3.4em;
    line-height: 0.8;
    margin-right: 5px;
    margin-top: 4px;
    font-weight: 900;
  }

  /* ── Photo ── */
  .photo-block {
    margin-bottom: 10px;
  }

  .photo-placeholder {
    width: 100%;
    background: linear-gradient(135deg, #888 0%, #444 40%, #666 70%, #333 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .photo-placeholder::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
  }

  .photo-caption {
    font-size: 10px;
    letter-spacing: 0.3px;
    margin-top: 4px;
    font-style: italic;
    opacity: 0.7;
  }

  /* ── Pull quote ── */
  .pull-quote {
    border-top: 3px solid;
    border-bottom: 1px solid;
    padding: 12px 0;
    margin: 10px 0;
  }

  .pull-quote p {
    font-size: 20px !important;
    line-height: 1.25 !important;
    font-style: italic !important;
    font-weight: 700;
    text-align: left !important;
    margin: 0 !important;
  }

  .pull-quote p::before { content: '\201C'; }
  .pull-quote p::after  { content: '\201D'; }

  /* Drop cap override for pull quote */
  .pull-quote p::first-letter {
    float: none !important;
    font-size: inherit !important;
    line-height: inherit !important;
    margin: 0 !important;
    font-weight: inherit !important;
  }

  /* ── Column presets ── */
  .cols-2 { grid-template-columns: 1fr 1fr; }
  .cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .cols-2-1 { grid-template-columns: 2fr 1fr; }
  .cols-1-2 { grid-template-columns: 1fr 2fr; }

  .span-2 { grid-column: span 2; }
  .span-3 { grid-column: span 3; }
  .span-full { grid-column: 1 / -1; }

  /* ── Font themes ── */
  .font-playfair    { --serif: 'Playfair Display', Georgia, serif; }
  .font-baskerville { --serif: 'Libre Baskerville', Georgia, serif; }
  .font-imfell      { --serif: 'IM Fell English', Georgia, serif; }
  .font-lora        { --serif: 'Lora', Georgia, serif; }
  .font-georgia     { --serif: Georgia, 'Times New Roman', serif; }

  .newspaper { font-family: var(--serif); }

  /* ── Color themes ── */
  .theme-cream   { --bg: #f2ece0; --ink: #1a1612; --rule: #1a1612; --accent: #1a1612; }
  .theme-aged    { --bg: #e8dfc8; --ink: #231f1a; --rule: #5a4a32; --accent: #3d2b1a; }
  .theme-white   { --bg: #fafaf8; --ink: #111; --rule: #111; --accent: #111; }
  .theme-sepia   { --bg: #d4c4a0; --ink: #2a1f12; --rule: #6b4c2a; --accent: #4a2f0a; }
  .theme-dusk    { --bg: #e8e0d4; --ink: #1c2028; --rule: #2a3040; --accent: #1c2028; }

  .newspaper {
    background: var(--bg);
    color: var(--ink);
  }
  .rule-double, .rule-single { border-color: var(--rule); }
  .pull-quote { border-color: var(--rule); }

  /* ── Animate in ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .newspaper { animation: fadeIn 0.35s ease; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .newspaper { padding: 24px 20px; }
    .cols-2, .cols-3, .cols-2-1, .cols-1-2 { grid-template-columns: 1fr; }
    .span-2, .span-3, .span-full { grid-column: span 1; }
    .deck { font-size: 15px; }
  }
</style>
</head>
<body>

<!-- Controls -->
<div class="controls">

  <label>Topic
    <select id="topicSelect">
      <option value="random">Random</option>
      <option value="tech">Technology</option>
      <option value="politics">Politics</option>
      <option value="science">Science</option>
      <option value="economy">Economy</option>
      <option value="environment">Environment</option>
      <option value="sports">Sports</option>
    </select>
  </label>

  <label>Layout
    <select id="layoutSelect">
      <option value="random">Random</option>
      <option value="classic">Classic (2-col)</option>
      <option value="wide-left">Wide Left</option>
      <option value="wide-right">Wide Right</option>
      <option value="three-col">Three Column</option>
      <option value="single">Single Column</option>
    </select>
  </label>

  <label>Font
    <select id="fontSelect">
      <option value="random">Random</option>
      <option value="font-playfair">Playfair Display</option>
      <option value="font-baskerville">Baskerville</option>
      <option value="font-imfell">IM Fell English</option>
      <option value="font-lora">Lora</option>
      <option value="font-georgia">Georgia</option>
    </select>
  </label>

  <label>Paper
    <select id="themeSelect">
      <option value="random">Random</option>
      <option value="theme-cream">Cream</option>
      <option value="theme-aged">Aged</option>
      <option value="theme-white">White</option>
      <option value="theme-sepia">Sepia</option>
      <option value="theme-dusk">Dusk</option>
    </select>
  </label>

  <label>Grain
    <input type="range" id="grainRange" min="0" max="1" step="0.1" value="0.5" style="width:70px;">
  </label>

  <div class="sep"></div>

  <button class="btn btn-primary" onclick="generate()">&#x2684; Randomize All</button>
  <button class="btn btn-secondary" onclick="generate(false)">&#x21BB; Regenerate</button>
</div>

<!-- Paper -->
<div class="paper-wrapper">
  <div class="newspaper" id="newspaper">
    <!-- generated by JS -->
  </div>
</div>

      `A goal scored in the second minute of added time delivered the championship title to a side that had not won the league in eleven years, sending the stadium into scenes of extraordinary jubilation. Tens of thousands of supporters had stayed until the final whistle despite a match that had seemed, for the eighty-eight minutes preceding the decisive moment, to be headed for an anticlimactic draw.\n\nThe scorer, a substitute who had been on the pitch for fewer than ten minutes, described the moment as the most significant of his career. His manager, who came close to resigning during a difficult run in the middle of the season, accepted the trophy with visible emotion, paying tribute to players who had persisted through a period of poor results that had seemed likely to end the title challenge prematurely.\n\nRivals who had led the standings for much of the year were unable to overturn the deficit in their simultaneous fixture, finishing the campaign in second place despite a points total that would have sufficed for the title in any of the previous five seasons. The final standings represent one of the most compressed top-three finishes in the competition's history.\n\nThe celebrations are expected to continue for several days. The club's board announced a public parade through the city centre for the following weekend, with several hundred thousand spectators expected to line the route.`,
      `An athlete competing in only her third major international final overcame the world number one in a contest that lasted nearly four hours to claim the most prestigious title in the sport. Her victory, achieved in three sets after surrendering the second in a tiebreak, is the most significant achieved by an unseeded finalist in the modern era of professional competition.\n\nHer rise through the rankings over the past eighteen months has been among the most rapid in the sport's recent history. This time last year she was ranked outside the top one hundred; she now stands on the threshold of the top ten following her victory, which carried a prize fund of several million dollars. Analysts predict she will close the year inside the top five if current form continues.`,
    ],
    quotes: [
      'Eleven years. Eleven long years. I am so proud of every person in that dressing room.',
      'I told myself not to think about the occasion. Just to play my game, point by point.',
      'This generation has the talent. What they needed was the belief. Today they found it.',
    ],
    captions: ['The triumphant captain lifts the trophy before an ecstatic home crowd at the packed stadium.', 'The champion celebrates on court after her victory over the defending title holder.'],
  },
};

const LOCATIONS = ['NEW DELHI', 'LONDON', 'WASHINGTON', 'PARIS', 'BEIJING', 'GENEVA', 'NEW YORK', 'SYDNEY', 'TOKYO'];
const CORRESPONDENTS = ['Our Special Correspondent', 'Our Foreign Correspondent', 'Our Staff Reporter', 'Our Economics Editor', 'From Our Science Correspondent'];

const FONTS   = ['font-playfair', 'font-baskerville', 'font-imfell', 'font-lora', 'font-georgia'];
const THEMES  = ['theme-cream', 'theme-aged', 'theme-white', 'theme-sepia', 'theme-dusk'];
const LAYOUTS = ['classic', 'wide-left', 'wide-right', 'three-col', 'single'];
const TOPICS  = ['tech', 'politics', 'science', 'economy', 'environment', 'sports'];

const HEADLINE_SIZES = ['52px', '58px', '64px', '48px', '70px'];
const BODY_SIZES     = ['14px', '15px', '13px', '14.5px'];

// ── Helpers ───────────────────────────────────────────────────────────────

const pick = arr => arr[Math.floor(Math.random() * arr.length)];

function formatDate() {
  const d = new Date();
  return d.toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
}

function splitIntoParagraphs(text) {
  return text.split('\n\n').filter(Boolean);
}

// Simple halftone-style SVG placeholder images
function photoSVG(seed, w, h) {
  const scenes = [
    // Generic "scene 1" — figure at desk
    `<rect width="${w}" height="${h}" fill="#ccc"/>
     <rect x="${w*0.3}" y="${h*0.25}" width="${w*0.4}" height="${h*0.5}" fill="#888" rx="3"/>
     <circle cx="${w*0.5}" cy="${h*0.2}" r="${h*0.12}" fill="#aaa"/>
     <rect x="0" y="${h*0.75}" width="${w}" height="${h*0.25}" fill="#999"/>`,
    // Generic "scene 2" — crowd/building
    `<rect width="${w}" height="${h}" fill="#b0b0b0"/>
     <rect x="${w*0.1}" y="${h*0.3}" width="${w*0.3}" height="${h*0.7}" fill="#777"/>
     <rect x="${w*0.5}" y="${h*0.15}" width="${w*0.4}" height="${h*0.85}" fill="#888"/>
     <rect x="${w*0.2}" y="${h*0.45}" width="${w*0.55}" height="${h*0.1}" fill="#555"/>`,
    // Generic "scene 3" — landscape
    `<rect width="${w}" height="${h*0.5}" fill="#b8c4cc"/>
     <rect width="${w}" y="${h*0.5}" height="${h*0.5}" fill="#7a8a70"/>
     <ellipse cx="${w*0.2}" cy="${h*0.45}" rx="${w*0.12}" ry="${h*0.25}" fill="#3a5030"/>
     <ellipse cx="${w*0.75}" cy="${h*0.5}" rx="${w*0.18}" ry="${h*0.35}" fill="#445038"/>`,
  ];
  const scene = scenes[seed % scenes.length];
  return `data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' width='${w}' height='${h}'>${encodeURIComponent(scene)}</svg>`;
}

// ── Generate ──────────────────────────────────────────────────────────────

let lastConfig = null;

function generate(randomizeControls = true) {
  if (randomizeControls) {
    document.getElementById('topicSelect').value  = 'random';
    document.getElementById('layoutSelect').value = 'random';
    document.getElementById('fontSelect').value   = 'random';
    document.getElementById('themeSelect').value  = 'random';
    document.getElementById('grainRange').value   = (Math.random() * 0.7 + 0.1).toFixed(1);
  }

  const topicVal  = document.getElementById('topicSelect').value;
  const layoutVal = document.getElementById('layoutSelect').value;
  const fontVal   = document.getElementById('fontSelect').value;
  const themeVal  = document.getElementById('themeSelect').value;
  const grain     = parseFloat(document.getElementById('grainRange').value);

  const topic   = topicVal  === 'random' ? pick(TOPICS)   : topicVal;
  const layout  = layoutVal === 'random' ? pick(LAYOUTS)  : layoutVal;
  const font    = fontVal   === 'random' ? pick(FONTS)    : fontVal;
  const theme   = themeVal  === 'random' ? pick(THEMES)   : themeVal;

  const data       = ARTICLES[topic];
  const headlinePair = pick(data.headlines);
  const headline   = headlinePair[0];
  const deck       = headlinePair[1];
  const bodyText   = pick(data.bodies);
  const pullQuote  = pick(data.quotes);
  const caption    = pick(data.captions);
  const paper      = pick(PAPERS);
  const location   = pick(LOCATIONS);
  const byline     = pick(CORRESPONDENTS);
  const hSize      = pick(HEADLINE_SIZES);
  const bSize      = pick(BODY_SIZES);
  const seed       = Math.floor(Math.random() * 3);
  const photoH     = [180, 200, 220, 160][Math.floor(Math.random() * 4)];

  const np = document.getElementById('newspaper');

  // Apply classes
  np.className = `newspaper ${font} ${theme}`;
  np.style.setProperty('--grain-opacity', grain);

  np.innerHTML = buildLayout(layout, { headline, deck, bodyText, pullQuote, caption, paper, location, byline, hSize, bSize, seed, photoH });
}

function buildLayout(layout, d) {
  const { headline, deck, bodyText, pullQuote, caption, paper, location, byline, hSize, bSize, seed, photoH } = d;
  const paras = splitIntoParagraphs(bodyText);
  const half  = Math.ceil(paras.length / 2);
  const third = Math.ceil(paras.length / 3);

  const photoImg = `<div class="photo-block">
    <div class="photo-placeholder" style="height:${photoH}px;">
      <img src="${photoSVG(seed, 360, photoH)}" style="width:100%;height:100%;object-fit:cover;opacity:0.7;filter:grayscale(100%) contrast(1.2);" alt="news photo"/>
    </div>
    <p class="photo-caption">${caption}</p>
  </div>`;

  const pq = `<div class="pull-quote"><p>${pullQuote}</p></div>`;

  const renderParas = (arr) => arr.map(p => `<p style="font-size:${bSize}">${p}</p>`).join('');

  const mastheadHTML = `
    <div class="masthead">
      <div class="masthead-name" style="font-size:11px;letter-spacing:6px;">${paper.toUpperCase()}</div>
      <div class="pub-date">${formatDate()} &nbsp;·&nbsp; Price: Two Rupees</div>
    </div>
    <div class="rule-double"></div>`;

  const topHTML = `
    ${mastheadHTML}
    <h1 class="headline" style="font-size:${hSize};margin-bottom:10px;">${headline}</h1>
    <p class="deck" style="font-style:italic;">${deck}</p>
    <div class="rule-single"></div>
    <div class="byline-block">
      <div class="dateline">${location} Pub.</div>
      <div class="byline">by ${byline}</div>
    </div>`;

  if (layout === 'single') {
    return `${topHTML}
      <div class="article-body" style="grid-template-columns:1fr;">
        <div>${renderParas(paras)}</div>
        ${photoImg}
        ${pq}
      </div>`;
  }

  if (layout === 'classic') {
    return `${topHTML}
      <div class="article-body cols-2">
        <div>${renderParas(paras.slice(0, half))}</div>
        <div>
          ${photoImg}
          ${renderParas(paras.slice(half, half + 1))}
          ${pq}
          ${renderParas(paras.slice(half + 1))}
        </div>
      </div>`;
  }

  if (layout === 'wide-left') {
    return `${topHTML}
      <div class="article-body cols-2-1">
        <div>${renderParas(paras.slice(0, Math.ceil(paras.length * 0.6)))}</div>
        <div>
          ${photoImg}
          ${pq}
          ${renderParas(paras.slice(Math.ceil(paras.length * 0.6)))}
        </div>
      </div>`;
  }

  if (layout === 'wide-right') {
    return `${topHTML}
      <div class="article-body cols-1-2">
        <div>
          ${photoImg}
          ${pq}
        </div>
        <div>${renderParas(paras)}</div>
      </div>`;
  }

  if (layout === 'three-col') {
    return `${topHTML}
      <div class="article-body cols-3">
        <div>${renderParas(paras.slice(0, third))}</div>
        <div>
          ${photoImg}
          ${renderParas(paras.slice(third, third + 1))}
          ${pq}
        </div>
        <div>${renderParas(paras.slice(third + 1))}</div>
      </div>`;
  }

  // fallback classic
  return `${topHTML}
    <div class="article-body cols-2">
      <div>${renderParas(paras.slice(0, half))}</div>
      <div>${photoImg}${pq}${renderParas(paras.slice(half))}</div>
    </div>`;
}

// ── Wire up live controls ────────────────────────────────────────────────

['topicSelect', 'layoutSelect', 'fontSelect', 'themeSelect'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => generate(false));
});

document.getElementById('grainRange').addEventListener('input', e => {
  document.getElementById('newspaper').style.setProperty('--grain-opacity', e.target.value);
});

// Initial render
generate(true);
</script>
</body>
</html>
